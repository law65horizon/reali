# src/graphql/schema/booking.graphql
enum BookingStatus {
  pending
  confirmed
  active
}

enum GuestType {
  all
  first_time
  repeated
}

type User {
  id: ID!
  name: String!
  uid: String!
  email: String!
  phone: String
  description: String
  created_at: String!
  address_id: ID
  address: Address
}

type Address {
    id: ID!
    street: String!
    city: String!
    postal_code: String
    country: String!
    latitude: Float
    longitude: Float
}

type Booking {
  id: ID!
  unit: RoomUnit!
  guest: User!
  check_in: Date!
  check_out: Date!
  total_price: Float!
  currency: String
  status: String!
  source: String
  created_at: String
  updated_at: String
}

input CreateBookingInput {
  guestId: ID!
  roomTypeId: ID!
  checkIn: Date!
  checkOut: Date!
  guestCount: Int!
  specialRequests: String
  source: String
}

type MyBookingResult {
  id: ID!
  type: String!
  checkIn: Date!
  checkOut: Date!
  guest: User!
  unit: RoomUnit!
  guestCount: Int!
  totalPrice: Float!
  amountPaid: Float!
  currency: String!
  specialRequests: String,
  cancellationPolicy: String
  payments: [Payment]
  property: Property!
  room_type: RoomType!
  status: String!
  payment_status: String!
  source: String
  created_at: String
  updated_at: String
}

input SearchBookingsInput {
  query: String
  startDate: Date
  endDate: Date
  status: BookingStatus!
  guestType: GuestType
  minPrice: Float
  maxPrice: Float
}

type Query {
  getBooking(id: ID!): MyBookingResult
  myBookings: [MyBookingResult!]
  myBookingsByStatus(input: SearchBookingsInput!): [MyBookingResult!]
  calculateBookingPrice(roomTypeId: ID!, checkIn: Date!, checkOut: Date!): BookingPriceCalculation
}

type Mutation {
  createBooking(input: CreateBookingInput!): BookingResult!
  updateBooking(id: ID!, status: String!): Booking!
  cancelBooking(id: ID!): BookingResult!
  refreshRateCalendar(roomTypeId: ID!, startDate: String!, endDate: String!): Boolean!
}

enum PaymentOption {
  FULL
  PARTIAL
}

type BookingResult {
  success: Boolean!
  message: String!
  booking: Booking
  errors: [String!]
}

type BookingPriceCalculation {
  roomTypeId: Int!
  checkIn: Date!
  checkOut: Date!
  nights: Int!
  useNightlyRates: Boolean!
  breakdown: PriceBreakdown!
  total: Float!
  currency: String!
}

type PriceBreakdown {
  subtotal: Float!
  nightlyRateDetails: [NightlyRateDetail!]
  periodRate: Float
  periodType: String
  cleaningFee: Float!
  serviceFee: Float!
  serviceFeePercent: Float!
  discount: Float
  discountPercent: Float
}

type NightlyRateDetail {
  date: Date!
  rate: Float!
}