# Updated property.graphql

enum ListingStatus {
  DRAFT
  PUBLISHED
  PENDING_REVIEW
  ARCHIVED
}

enum SaleStatus {
  sale 
  rent
}

enum PropertyType {
  APARTMENT
  HOUSE
  HOTEL
}

type PropertyReview {
    id: ID!
    property_id: ID!
    user_id: ID!
    user: User!
    rating: Int!
    comment: String
    created_at: DateTime!
}

type Address {
  id: ID!
  street: String!
  city: String!
  postal_code: String
  country: String!
  latitude: Float
  longitude: Float
}

type Image {
  id: ID!
  cdn_url: String!
  width: Int
  height: Int
}

type User {
  id: ID!
  name: String!
  uid: String!
  email: String!
  phone: String
  description: String
  created_at: String!
  address_id: ID
  address: Address
}

type Property {
  id: ID!
  realtor: User!
  realtor_id: ID!
  address_id: ID!
  title: String
  speciality: String
  property_type: String!
  sale_status: String!
  price: Float
  status: String!
  description: String
  address: Address
  amenities: [String]
  roomTypes: [RoomType!]!
  images: [Image!]
  bookings: [PropertyBooking!]!
  reviews: [PropertyReview!]!
  created_at: DateTime!
  updated_at: DateTime!
}

type RateCalendarEntry {
  date: Date!
  nightly_rate: Float!
  min_stay: Int
  is_blocked: Boolean
}

input RateCalendarEntryInput {
  date: Date!
  nightlyRate: Float!
  minStay: Int
  isBlocked: Boolean
}

type PropertyBooking {
  id: ID!
  unit: RoomUnit!
  guest: User!
  checkIn: Date!
  checkOut: Date!
  totalPrice: Float!
  currency: String
  status: String!
  source: String
  createdAt: String
}

type PageInfo {
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
    startCursor: String
    endCursor: String
}

type PropertyWithRealtor {
    id: ID!
    address: Address
    realtor_id: ID!
    price: Float
    description: String
    realtor: User!
}

input PropertyInput {
  realtor_id: ID!
  address: AddressInput!
  title: String
  speciality: String
  amenities: [String!]!
  price: Float
  images: [ImageInput!]!
  description: String
  status: ListingStatus
  property_type: String!
  sale_status: String!
}

input UpdatePropertyInput {
  realtor_id: ID!
  address: AddressInput
  title: String
  speciality: String
  amenities: [String!]
  price: Float
  images: ImageManageMentInput
  description: String
  status: ListingStatus
  property_type: String
  sale_status: String
}

input ImageManageMentInput {
  add: [ImageInput!]

  remove: [ID!]

  update: [ImageUpdateInput!]
}

input ImageUpdateInput {
    id: ID!
    display_order: Int
    is_primary: Boolean
  }

input ImageInput {
  storage_key: String!
  uri: String!
  fileName: String
  mimeType: String
  fileSize: Int
  width: Int
  height: Int
}

input RoomUnitInput {
  roomTypeId: ID!
  unitCode: String
  floorNumber: Int
  status: String
}

input RoomTypeInput {
  name: String!
  description: String
  capacity: Int
  bedCount: Int
  bathroomCount: Int
  sizeSqft: Int
  basePrice: Float
  currency: String
  isActive: Boolean
  amenities: [String]
  pricingRules: [CreatePricingRuleInput!]
  durationDiscounts: [CreateDurationDiscountInput!]
}

input CreateDurationDiscountInput {
  stayType: String! # weekly | monthly
  discountPercent: Float!
}

input CreatePricingRuleInput {
  startDate: Date!
  endDate: Date!
  nightlyRate: Float
  minStay: Int
  maxStay: Int
  note: String
}

input AddressInput {
    street: String!
    city: String!
    postal_code: String
    country: String!
    longitude: Float
    latitude: Float
}

input PropertySearchInput {
    query: String
    minPrice: Float
    maxPrice: Float
    speciality: String
    amenities: [String!]
    startDate: Date
    endDate: Date
    minRating: Float
}

type PropertyEdge {
  node: Property!
  cursor: String!
}

type PropertyConnection {
  edges: [PropertyEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type RoomTypeEdge {
  node: RoomType!
  cursor: String!
}

type RoomTypeConnection {
  edges: [RoomTypeEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type CloudinarySignature {
  signature: String!
  timestamp: String!
  cloudName: String!
  apiKey: String!
}

input SearchRoomsInput {
  propertyType: [String!]
  sale_status: SaleStatus
  beds: Int
  bathrooms: Int
  minPrice: Float
  maxPrice: Float
  minSize: Float
  maxSize: Float
  amenities: [String!]
  query: String
  value: String
  checkIn: String
  checkOut: String
  first: Int = 20
  after: String
  latitude: Float
  longitude: Float
  radius: Int
}

type OtherInfo {
  title: String
}

type QuickSearch {
  id: ID
  category: String
  created_at: String
  other: OtherInfo
  city: NameIDPair
  country: NameIDPair
  geom: String
  postal_code: String
  street: String
}

type NameIDPair {
  id: ID!
  name: String!
}


type QuickSearchResult {
  search_type: String
  quickSearch: [QuickSearch]
}

type RecentSearches {
  userId: ID!
  tag: String!
  postal_code: Int
  city: String
  street: String
  latitude: Float
  longitude: Float
}

input RecentSearchesInput {
  userId: ID!
  tag: String!
  postal_code: Int
  city: String
  street: String
  latitude: Float
  longitude: Float
}

input WishlistInput {
  propertyId: String!
}

type Query {
  quickSearch(query: String, latitude: Float, longitude: Float, radius: Float): QuickSearchResult
  searchRoomTypes(input: SearchRoomsInput): RoomTypeConnection!
  getRoomTypes(ids: [ID!]): RoomTypeConnection!

  getProperty(id: ID!): Property

  myProperties(realtor_id: ID!): [Property!]!

  getRoomType(id: ID!): RoomType
  # Get calendar pricing and availability for a room type
  getAvailability(id: ID!, startDate: Date!, endDate: Date!): [RateCalendarEntry!]!

  # Get available units in a room type
  getAvailableUnits(id: ID!, checkIn: Date, checkOut: Date): [RoomUnit!]!

  searchRecents(userId: ID!): [RecentSearches]
}

type Mutation {
  createProperty(input: PropertyInput!): Property!
  updateProperty(id: ID!, input: UpdatePropertyInput!): Property!
  publishProperty(id: ID!): Property!
  archiveProperty(id: ID!): Property!
  deleteProperty(id: ID!): Response!
  generateCloudinarySignature: CloudinarySignature!
  addToRecents(input: RecentSearchesInput): RecentSearches!
  # addToWishLists(input: WishlistInput!): Boolean!
  # removeFromWishLists(input: WishlistInput!): Boolean!
}

# Scalar Types
scalar Date
scalar DateTime
