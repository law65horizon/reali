type CreatePaymentIntentResponse {
    clientSecret: String!
  }

  input CreatePaymentIntentInput {
    bookingId: ID!
    amount: Int!         # in cents
    currency: String!    # "usd"
  }
  
  input CreateCheckoutSessionInput {
    bookingId: ID!
    successUrl: String!
    cancelUrl: String!
    paymentOption: PaymentOption!
  }

  type Mutation {
    createPaymentIntent(input: CreatePaymentIntentInput!): CreatePaymentIntentResponse!
    createCheckoutSession(input: CreateCheckoutSessionInput!): CheckoutSession!

    processRefund(
      bookingId: Int!
      amount: Float
      reason: String
    ): RefundResult!
  }

  type CheckoutSession {
    clientSecret: String!
    payment: Payment!
    booking: Booking!
  }

  type RefundResult {
    success: Boolean!
    refundId: String
    message: String
  }

  type Query {
    getPayment(bookingId: Int!): Payment
    getPaymentHistory(userId: Int!): [Payment!]!
  }

type Payment {
  id: ID!
  booking_id: ID!
  amount: Float!
  currency: String!
  status: String!
  refunded_amount: Float
  refunded_at: String
  created_at: String
  payment_method: String
}